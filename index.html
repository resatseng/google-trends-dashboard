<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang TC','Noto Sans TC',sans-serif;background:#f0f2f8;color:#333;min-height:100vh}
.wrap{max-width:1200px;margin:0 auto;padding:24px 16px}
h1{font-size:1.4rem;font-weight:700;color:#1e1e3f;margin-bottom:4px}
.sub{color:#777;font-size:.82rem;margin-bottom:20px}
.card{background:#fff;border-radius:14px;padding:20px;box-shadow:0 1px 6px rgba(0,0,0,.07);margin-bottom:18px}
h2{font-size:.95rem;font-weight:600;margin-bottom:14px;color:#444}
.stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.stat{flex:1;min-width:110px;background:#fff;border-radius:10px;padding:12px 14px;box-shadow:0 1px 4px rgba(0,0,0,.06);border-top:3px solid transparent}
.sv{font-size:1.4rem;font-weight:700}
.sl{font-size:.72rem;color:#888;margin-top:2px}
/* Range */
.range-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.range-row label{font-size:.82rem;color:#555;font-weight:600;white-space:nowrap}
.rsel{padding:6px 10px;border:1.5px solid #d0d0e0;border-radius:8px;font-size:.82rem;background:#fff;cursor:pointer;outline:none;transition:.15s}
.rsel:focus{border-color:#5c6bc0}
.rbtn{padding:5px 13px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:.78rem;cursor:pointer;background:#fff;color:#777;transition:.15s}
.rbtn:hover{border-color:#5c6bc0;color:#5c6bc0}
.rhint{font-size:.75rem;color:#aaa}
.mchips{display:flex;gap:6px;flex-wrap:wrap}
.mchip{padding:3px 10px;border-radius:12px;font-size:.72rem;font-weight:500;border:1.5px solid #e0e0e0;color:#777;background:#fff;transition:.2s}
.mchip.in{background:#5c6bc0;color:#fff;border-color:#5c6bc0}
.mchip.out{opacity:.38}
/* View tabs */
.vtabs{display:flex;gap:0;margin-bottom:18px;border-bottom:2px solid #e8eaf0}
.vtab{padding:9px 22px;font-size:.88rem;font-weight:600;cursor:pointer;color:#999;border-bottom:3px solid transparent;margin-bottom:-2px;transition:.15s;user-select:none}
.vtab.on{color:#5c6bc0;border-color:#5c6bc0}
.view{display:none}
.view.on{display:block}
/* Pills */
.pills{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
.pill{padding:5px 14px;border-radius:20px;border:1.5px solid #e0e0e0;background:#fff;cursor:pointer;font-size:.78rem;font-weight:500;transition:.15s;color:#555;white-space:nowrap}
.pill.active{color:#fff;border-color:transparent}
/* Search */
.search{width:100%;padding:9px 13px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:.875rem;outline:none;transition:.15s;margin-bottom:14px}
.search:focus{border-color:#5c6bc0}
/* Table */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th{text-align:left;padding:9px 12px;border-bottom:2px solid #f0f0f0;color:#999;font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.4px;cursor:pointer;user-select:none;white-space:nowrap}
th.sort-desc::after{content:" ↓"}
th.sort-asc::after{content:" ↑"}
td{padding:9px 12px;border-bottom:1px solid #f5f5f5;vertical-align:middle}
tr:hover td{background:#fafbff}
.badge{display:inline-block;padding:2px 9px;border-radius:10px;font-size:.71rem;font-weight:500;white-space:nowrap}
.cbar{display:flex;align-items:center;gap:7px}
.cbg{flex:1;max-width:70px;height:5px;background:#f0f0f0;border-radius:3px}
.cbf{height:5px;border-radius:3px;transition:width .3s}
.cnum{font-weight:600;min-width:18px;font-size:.85rem}
/* Trend badge */
.trend{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.72rem;font-weight:600;white-space:nowrap}
/* Trend filter */
.tfilter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.tfbtn{padding:4px 12px;border-radius:16px;border:1.5px solid #e0e0e0;background:#fff;cursor:pointer;font-size:.76rem;font-weight:500;transition:.15s;color:#666}
.tfbtn.on{color:#fff;border-color:transparent}
/* Sparkline */
.spark{display:flex;align-items:flex-end;gap:2px;height:26px}
.sbar{width:10px;border-radius:2px 2px 0 0;min-height:2px;transition:height .2s,opacity .2s}
/* Chart */
.chart-wrap{position:relative;height:300px}
/* Pagination */
.pag{display:flex;gap:6px;justify-content:center;align-items:center;margin-top:14px;flex-wrap:wrap}
.pb{padding:5px 11px;border:1.5px solid #e0e0e0;border-radius:6px;cursor:pointer;background:#fff;font-size:.82rem;transition:.1s}
.pb:hover{border-color:#5c6bc0;color:#5c6bc0}
.pb.on{background:#5c6bc0;color:#fff;border-color:#5c6bc0}
.pb:disabled{opacity:.35;cursor:default;pointer-events:none}
.pinfo{color:#aaa;font-size:.78rem}
.empty{text-align:center;padding:28px;color:#ccc;font-size:.9rem}
/* Topic table */
.topic-row td{vertical-align:top;padding:13px 12px}
.topic-name{font-weight:700;font-size:.93rem}
.topic-desc{font-size:.74rem;color:#888;margin-top:2px}
.member-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;max-width:340px}
.mchp{padding:2px 8px;border-radius:10px;font-size:.7rem;font-weight:500;cursor:default}
</style>
</head>
<body>
<div class="wrap">
  <h1>📊 Google Trends — 總體商業環境關鍵字</h1>
  <p class="sub">白名單制：僅保留與商業環境相關的關鍵字</p>

  <!-- Time range card -->
  <div class="card" style="padding:16px 20px">
    <div class="range-row">
      <label>📅 時間區間</label>
      <select class="rsel" id="rs"></select>
      <span style="color:#bbb">～</span>
      <select class="rsel" id="re"></select>
      <button class="rbtn" onclick="resetRange()">顯示全部</button>
      <span class="rhint" id="rhint"></span>
    </div>
    <div class="mchips" id="mchips"></div>
  </div>

  <div class="stats" id="stats"></div>

  <div class="card">
    <h2>🏆 區間內出現次數 Top 20</h2>
    <div class="chart-wrap"><canvas id="barChart"></canvas></div>
  </div>

  <!-- View toggle -->
  <div class="vtabs">
    <div class="vtab on" id="tab-kw" onclick="switchView('kw')">🔍 關鍵字視角</div>
    <div class="vtab" id="tab-tp" onclick="switchView('tp')">🌐 主題視角</div>
  </div>

  <!-- keyword view -->
  <div class="view on" id="view-kw">
    <div class="card">
      <div class="pills" id="pills"></div>
      <!-- Trend filter -->
      <div class="tfilter" id="tfilter">
        <span style="font-size:.78rem;color:#888;align-self:center">趨勢：</span>
        <button class="tfbtn on" style="background:#555;border-color:#555" onclick="setTrend('ALL')">全部</button>
        <button class="tfbtn" style="color:#7e57c2;border-color:#7e57c2" onclick="setTrend('new')">★ 新興</button>
        <button class="tfbtn" style="color:#43a047;border-color:#43a047" onclick="setTrend('up')">↑ 上升</button>
        <button class="tfbtn" style="color:#aaa;border-color:#ccc" onclick="setTrend('flat')">→ 持平</button>
        <button class="tfbtn" style="color:#e53935;border-color:#e53935" onclick="setTrend('down')">↓ 下降</button>
      </div>
      <input class="search" id="search" placeholder="搜尋關鍵字或類別…" type="text">
      <div class="tbl-wrap">
        <table>
          <thead><tr>
            <th id="th-keyword" onclick="doSort('keyword')">關鍵字</th>
            <th id="th-category" onclick="doSort('category')">類別</th>
            <th id="th-total" class="sort-desc" onclick="doSort('total')">區間次數</th>
            <th id="th-trend" onclick="doSort('trend')">趨勢</th>
            <th>月份趨勢</th>
            <th>各月明細</th>
          </tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <div class="pag" id="pag"></div>
    </div>
  </div>

  <!-- topic view -->
  <div class="view" id="view-tp">
    <div class="card">
      <p style="font-size:.8rem;color:#aaa;margin-bottom:14px">多個相關關鍵字聚合為同一主題，顯示該主題在選定區間的合計熱度與趨勢</p>
      <div class="tbl-wrap">
        <table>
          <thead><tr>
            <th>主題</th>
            <th>區間次數</th>
            <th>趨勢</th>
            <th>月份趨勢</th>
            <th>關鍵字成員</th>
          </tr></thead>
          <tbody id="topic-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

</div>

  '產業活動/研調':'#8d6e63'
};
const CATS = Object.keys(COLORS);

// ── state ──
let rs = 0, re = MONTHS.length - 1;
let activeCat = 'ALL', activeTrend = 'ALL', q = '', sortKey = 'total', sortDir = -1, pg = 1;
let activeView = 'kw';
const PG = 20;
let barChart = null;

// ── helpers ──
function effTotal(k) {
  return k.monthly.slice(rs, re + 1).reduce((a, b) => a + b, 0);
}

function trendInfo(k) {
  const n = re - rs + 1;
  if (n < 2) return { key: 'flat', label: '→ 持平', color: '#aaa', score: 1 };
  const mid = rs + Math.floor(n / 2);
  const early  = k.monthly.slice(rs, mid).reduce((a,b) => a+b, 0);
  const recent = k.monthly.slice(mid, re+1).reduce((a,b) => a+b, 0);
  if (early === 0 && recent > 0)  return { key: 'new',  label: '★ 新興', color: '#7e57c2', score: 3 };
  if (recent > early * 1.2 + 0.5) return { key: 'up',   label: '↑ 上升', color: '#43a047', score: 2 };
  if (early  > recent * 1.2 + 0.5)return { key: 'down', label: '↓ 下降', color: '#e53935', score: 0 };
  return { key: 'flat', label: '→ 持平', color: '#aaa', score: 1 };
}

// ── view toggle ──
function switchView(v) {
  activeView = v;
  ['kw','tp'].forEach(id => {
    document.getElementById('tab-' + id).classList.toggle('on', id === v);
    document.getElementById('view-' + id).classList.toggle('on', id === v);
  });
  if (v === 'tp') renderTopics();
}

// ── range selectors ──
function buildRange() {
  ['rs','re'].forEach(id => {
    const el = document.getElementById(id);
    el.innerHTML = MONTHS.map((m, i) => `<option value="${i}">${m}</option>`).join('');
  });
  document.getElementById('re').value = MONTHS.length - 1;
  document.getElementById('rs').addEventListener('change', applyRange);
  document.getElementById('re').addEventListener('change', applyRange);
}

function applyRange() {
  let a = +document.getElementById('rs').value;
  let b = +document.getElementById('re').value;
  if (a > b) { [a, b] = [b, a]; document.getElementById('rs').value = a; document.getElementById('re').value = b; }
  rs = a; re = b; pg = 1;
  refreshAll();
}

function resetRange() {
  rs = 0; re = MONTHS.length - 1;
  document.getElementById('rs').value = 0;
  document.getElementById('re').value = MONTHS.length - 1;
  pg = 1;
  refreshAll();
}

function refreshAll() {
  updateHint();
  updateChips();
  updateStats();
  renderChart();
  render();
  if (activeView === 'tp') renderTopics();
}

function updateHint() {
  document.getElementById('rhint').textContent = `共 ${re - rs + 1} 個月`;
}

function updateChips() {
  document.getElementById('mchips').innerHTML = MONTHS.map((m, i) =>
    `<div class="mchip ${i >= rs && i <= re ? 'in' : 'out'}">${m}</div>`
  ).join('');
}

// ── stats ──
function updateStats() {
  const vis = KW.filter(k => effTotal(k) > 0);
  document.getElementById('stats').innerHTML =
    `<div class="stat" style="border-color:#5c6bc0"><div class="sv" style="color:#5c6bc0">${vis.length}</div><div class="sl">有出現的關鍵字</div></div>` +
    CATS.map(c => {
      const n = vis.filter(k => k.category === c).length;
      return `<div class="stat" style="border-color:${COLORS[c]}"><div class="sv" style="color:${COLORS[c]}">${n}</div><div class="sl">${c}</div></div>`;
    }).join('');
}

// ── category pills ──
const pillsEl = document.getElementById('pills');
pillsEl.innerHTML =
  `<button class="pill active" style="background:#5c6bc0" onclick="setCat('ALL')">全部</button>` +
  CATS.map(c => `<button class="pill" style="color:${COLORS[c]};border-color:${COLORS[c]}" onclick="setCat('${c}')">${c}</button>`).join('');

function setCat(c) {
  activeCat = c; pg = 1;
  pillsEl.querySelectorAll('.pill').forEach(p => {
    const isAll = p.textContent === '全部';
    const match = (c === 'ALL' && isAll) || p.textContent === c;
    p.classList.toggle('active', match);
    p.style.background = match ? (isAll ? '#5c6bc0' : COLORS[c]) : '#fff';
  });
  render();
}

function setTrend(t) {
  activeTrend = t; pg = 1;
  const TCOL = { ALL:'#555', new:'#7e57c2', up:'#43a047', flat:'#aaa', down:'#e53935' };
  document.querySelectorAll('.tfbtn').forEach(b => {
    const key = b.getAttribute('onclick').match(/'(\w+)'/)[1];
    const on = key === t;
    b.classList.toggle('on', on);
    b.style.background = on ? (TCOL[key]||'#555') : '#fff';
    b.style.borderColor = on ? 'transparent' : (TCOL[key]||'#ccc');
    b.style.color = on ? '#fff' : (TCOL[key]||'#666');
  });
  render();
}

document.getElementById('search').addEventListener('input', e => { q = e.target.value.toLowerCase(); pg = 1; render(); });

// ── sort ──
function doSort(k) {
  if (sortKey === k) sortDir *= -1;
  else { sortKey = k; sortDir = k === 'total' ? -1 : 1; }
  ['keyword','category','total'].forEach(x => {
    const el = document.getElementById('th-' + x);
    el.className = x === k ? (sortDir === -1 ? 'sort-desc' : 'sort-asc') : '';
  });
  render();
}

// ── filter + sort ──
function filtered() {
  return KW
    .filter(k => effTotal(k) > 0
      && (activeCat === 'ALL' || k.category === activeCat)
      && (activeTrend === 'ALL' || trendInfo(k).key === activeTrend)
      && (k.keyword.toLowerCase().includes(q) || k.category.toLowerCase().includes(q)))
    .sort((a, b) => {
      if (sortKey === 'total') return sortDir * (effTotal(b) - effTotal(a));
      if (sortKey === 'trend') return sortDir * (trendInfo(b).score - trendInfo(a).score);
      const va = a[sortKey], vb = b[sortKey];
      return typeof va === 'string' ? sortDir * va.localeCompare(vb, 'zh-TW') : sortDir * (va - vb);
    });
}

// ── sparkline ──
function spark(monthly, col) {
  const inVals = monthly.slice(rs, re + 1);
  const mx = Math.max(...inVals, 1);
  return '<div class="spark">' + monthly.map((v, i) => {
    const inR = i >= rs && i <= re;
    const h = inR ? Math.max(Math.round(v / mx * 24), v > 0 ? 3 : 2) : (v > 0 ? 4 : 2);
    const bg = inR ? (v > 0 ? col : '#ddd') : '#d0d0d0';
    return `<div class="sbar" title="${MONTHS[i]}: ${v}次${inR ? '' : ' (範圍外)'}"
      style="height:${h}px;background:${bg};opacity:${inR ? 1 : 0.3}"></div>`;
  }).join('') + '</div>';
}

// ── render keyword table ──
function render() {
  const list = filtered();
  const tot = list.length, pages = Math.max(1, Math.ceil(tot / PG));
  if (pg > pages) pg = pages;
  const slice = list.slice((pg - 1) * PG, pg * PG);
  const mx = Math.max(...list.map(k => effTotal(k)), 1);

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = slice.length === 0
    ? '<tr><td colspan="6" class="empty">此區間沒有符合的關鍵字</td></tr>'
    : slice.map(k => {
        const col = COLORS[k.category] || '#888';
        const et = effTotal(k);
        const pct = Math.round(et / mx * 100);
        const detail = MONTHS.map((m, i) => {
          if (!k.monthly[i]) return '';
          const inR = i >= rs && i <= re;
          return `<span style="opacity:${inR ? 1 : 0.4}">${m}(${k.monthly[i]})</span>`;
        }).filter(Boolean).join(' ');
        const tr = trendInfo(k);
        return `<tr>
          <td><strong>${k.keyword}</strong></td>
          <td><span class="badge" style="background:${col}22;color:${col}">${k.category}</span></td>
          <td><div class="cbar">
            <span class="cnum" style="color:${col}">${et}</span>
            <div class="cbg"><div class="cbf" style="width:${pct}%;background:${col}"></div></div>
          </div></td>
          <td><span class="trend" style="background:${tr.color}22;color:${tr.color}">${tr.label}</span></td>
          <td>${spark(k.monthly, col)}</td>
          <td style="color:#999;font-size:.75rem;line-height:1.7">${detail || '—'}</td>
        </tr>`;
      }).join('');

  // pagination
  const pagEl = document.getElementById('pag');
  if (pages <= 1) { pagEl.innerHTML = `<span class="pinfo">共 ${tot} 筆</span>`; return; }
  let h = `<button class="pb" onclick="go(${pg-1})" ${pg===1?'disabled':''}>‹</button>`;
  const lo = Math.max(1, pg-2), hi = Math.min(pages, pg+2);
  if (lo > 1) h += `<button class="pb" onclick="go(1)">1</button>${lo > 2 ? '<span class="pinfo">…</span>' : ''}`;
  for (let i = lo; i <= hi; i++) h += `<button class="pb ${i===pg?'on':''}" onclick="go(${i})">${i}</button>`;
  if (hi < pages) h += `${hi < pages-1 ? '<span class="pinfo">…</span>' : ''}<button class="pb" onclick="go(${pages})">${pages}</button>`;
  h += `<button class="pb" onclick="go(${pg+1})" ${pg===pages?'disabled':''}>›</button><span class="pinfo">共 ${tot} 筆</span>`;
  pagEl.innerHTML = h;
}

function go(p) { pg = p; render(); }

// ── render topic table ──
function renderTopics() {
  const visible = TOPICS.filter(t => t.monthly.slice(rs, re+1).reduce((a,b)=>a+b,0) > 0)
                        .sort((a,b) => {
                          const ta = a.monthly.slice(rs,re+1).reduce((x,y)=>x+y,0);
                          const tb = b.monthly.slice(rs,re+1).reduce((x,y)=>x+y,0);
                          return tb - ta;
                        });
  const mx = Math.max(...visible.map(t => t.monthly.slice(rs,re+1).reduce((a,b)=>a+b,0)), 1);

  document.getElementById('topic-tbody').innerHTML = visible.length === 0
    ? '<tr><td colspan="5" class="empty">此區間沒有主題資料</td></tr>'
    : visible.map(t => {
        const et = t.monthly.slice(rs, re+1).reduce((a,b)=>a+b,0);
        const pct = Math.round(et / mx * 100);
        const tr = trendInfo(t);
        // member chips — show at most 12, sorted by in-range total
        const sorted_members = t.members
          .map(m => ({ ...m, et: m.monthly.slice(rs,re+1).reduce((a,b)=>a+b,0) }))
          .filter(m => m.et > 0)
          .sort((a,b) => b.et - a.et);
        const chips = sorted_members.slice(0, 12).map(m =>
          `<span class="mchp" style="background:${t.color}18;color:${t.color}">${m.keyword} ×${m.et}</span>`
        ).join('');
        const extra = sorted_members.length > 12
          ? `<span class="mchp" style="background:#eee;color:#999">+${sorted_members.length-12} 個</span>` : '';
        return `<tr class="topic-row">
          <td>
            <div class="topic-name" style="color:${t.color}">${t.topic}</div>
            <div class="topic-desc">${t.desc}</div>
          </td>
          <td><div class="cbar">
            <span class="cnum" style="color:${t.color}">${et}</span>
            <div class="cbg" style="max-width:90px"><div class="cbf" style="width:${pct}%;background:${t.color}"></div></div>
          </div></td>
          <td><span class="trend" style="background:${tr.color}22;color:${tr.color}">${tr.label}</span></td>
          <td>${spark(t.monthly, t.color)}</td>
          <td><div class="member-chips">${chips}${extra}</div></td>
        </tr>`;
      }).join('');
}

// ── bar chart ──
function renderChart() {
  const top = [...KW].filter(k => effTotal(k) > 0).sort((a,b) => effTotal(b)-effTotal(a)).slice(0,20);
  const cols = top.map(k => COLORS[k.category] || '#888');
  const data = {
    labels: top.map(k => k.keyword),
    datasets: [{ data: top.map(k => effTotal(k)), backgroundColor: cols.map(c=>c+'bb'), borderColor: cols, borderWidth: 1.5, borderRadius: 4 }]
  };
  if (barChart) {
    barChart.data = data;
    barChart.update('active');
  } else {
    barChart = new Chart(document.getElementById('barChart'), {
      type: 'bar', data,
      options: {
        indexAxis: 'y', responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: {
            label: ctx => ` 區間累計 ${ctx.raw} 次`,
            afterLabel: ctx => `類別：${top[ctx.dataIndex].category}`
          }}
        },
        scales: {
          x: { grid: { color: '#f0f0f0' }, ticks: { stepSize: 1 } },
          y: { grid: { display: false }, ticks: { font: { size: 12 } } }
        }
      }
    });
  }
}

// ── init ──
buildRange();
refreshAll();
</script>
</body>
</html>
